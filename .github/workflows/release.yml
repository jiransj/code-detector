name: build-and-release

on:
  push:
    tags:
      - 'code-detector-v*'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            binary: code-detector
            asset_name: code-detector-linux
          - os: windows-latest
            binary: code-detector.exe
            asset_name: code-detector-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build
        run: go build -ldflags="-s -w" -o ${{ matrix.binary }} ./cmd/scanner/
        env:
          CGO_ENABLED: 1

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ matrix.binary }}
