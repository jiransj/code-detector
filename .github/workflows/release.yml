name: build-and-release

on:
  push:
    tags:
      - 'code-detector-v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            binary: code-detector
            asset_name: code-detector-linux
          - os: windows-latest
            binary: code-detector.exe
            asset_name: code-detector-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build
        run: go build -ldflags="-s -w" -o ${{ matrix.binary }} ./cmd/code-detector/
        env:
          CGO_ENABLED: 1

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ matrix.binary }}

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#code-detector-}"    # e.g. code-detector-v0.9 → v0.9
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Find and prepare changelog
        id: changelog
        shell: bash
        run: |
          CHANGELOG_FILE="CHANGELOG.md"
          if [ -f "$CHANGELOG_FILE" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "body<<EOF" >> "$GITHUB_OUTPUT"
            cat "$CHANGELOG_FILE" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Release with Changelog
        uses: softprops/action-gh-release@v2
        if: steps.changelog.outputs.found == 'true'
        with:
          tag_name: ${{ github.ref_name }}
          name: code-detector ${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
